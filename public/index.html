<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="AI 每日简报，中文摘要，按日期归档。" />
    <title>AI 每日简报</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="masthead">
        <p class="eyebrow"><span class="status-dot" aria-hidden="true"></span>ai.arixbit.me</p>
        <h1>AI 每日简报</h1>
        <p class="dek">面向工程、产品和研究判断的中文 AI 资讯摘读。</p>
      </div>
      <div class="issue-card" aria-label="站点状态">
        <span>Latest Issue</span>
        <p id="updatedAt" class="updated-at">加载中</p>
      </div>
    </header>

    <main class="layout">
      <aside class="archive" aria-label="日期归档">
        <div class="archive-head">
          <h2>日期归档</h2>
          <span>Archive</span>
        </div>
        <nav id="archiveList" class="archive-list"></nav>
      </aside>

      <section class="brief" aria-live="polite">
        <div class="brief-head">
          <div>
            <p id="briefDate" class="eyebrow">今日</p>
            <h2 id="briefTitle">正在加载简报</h2>
          </div>
          <div class="brief-meta">
            <p id="briefCount" class="brief-count"></p>
            <span class="meta-rule" aria-hidden="true"></span>
          </div>
        </div>

        <ol id="newsList" class="news-list"></ol>
        <p id="emptyState" class="empty-state" hidden>暂无简报数据。</p>
      </section>
    </main>

    <footer class="site-footer">
      <span>每日整理，帮助你更快把握 AI 进展</span>
      <span>保留原始出处，便于继续阅读与核实</span>
    </footer>

    <script src="app.js" type="module"></script>
  </body>
</html>
